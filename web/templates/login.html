<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('nanobk_web_panel') }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-container">
    <h1>{{ t('login_title') }}</h1>
    <form method="POST" action="/login">
      <label for="token">{{ t('login_token_label') }}</label>
      <input type="password" id="token" name="token" placeholder="{{ t('login_token_placeholder') }}" required autofocus>
      <button type="submit">{{ t('login_button') }}</button>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
    </form>
  </div>
</body>
</html>
