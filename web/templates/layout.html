<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NanoBK{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a href="/">{{ t('nav_dashboard') }}</a>
    <a href="/status">{{ t('nav_status') }}</a>
    <a href="/doctor">{{ t('nav_doctor') }}</a>
    <a href="/rotate">{{ t('nav_rotate') }}</a>
    <form method="POST" action="/logout" style="display:inline">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <button type="submit" class="nav-button">{{ t('nav_logout') }}</button>
    </form>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
